<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Noise Analytics Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #060a13;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .glass-card {
            background: rgba(13, 20, 35, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #020617;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 3px;
        }

        /* --- ADVANCED ANIMATIONS SCENARIOS --- */
        
        /* 1. Equalizer Bar Keyframes */
        @keyframes bounceBar {
            0%, 100% { transform: scaleY(0.15); }
            50% { transform: scaleY(1); }
        }
        .eq-bar {
            transform-origin: bottom;
            animation: bounceBar 1s ease-in-out infinite;
            animation-play-state: paused; /* Controlled via JS */
        }

        /* 2. Radar Scanner Ring Sweeps */
        @keyframes radarSweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .radar-line {
            transform-origin: bottom right;
            animation: radarSweep 4s linear infinite;
        }
        @keyframes pulseRing {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .radar-pulse {
            animation: pulseRing 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 pb-6 border-b border-slate-800/80 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-black tracking-tight bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-400 bg-clip-text text-transparent">
                    <i class="fa-solid fa-satellite-dish mr-2 animate-pulse"></i>NOISE ANALYTICS DEPLOYMENT
                </h1>
                <p class="text-slate-400 text-sm mt-1 font-mono">Core Hardware Integration & Ambient Telemetry Panel</p>
            </div>
            
            <div class="flex gap-3 text-xs font-mono">
                <div class="glass-card px-4 py-2 rounded-lg flex items-center gap-2 border border-emerald-500/10">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    SERVER: <span class="text-emerald-400 font-bold">ONLINE</span>
                </div>
                <div class="glass-card px-4 py-2 rounded-lg flex items-center gap-2 border border-slate-700/30">
                    ENGINE: <span id="engineBadge" class="text-amber-400 font-bold">IDLE</span>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 flex flex-col gap-6">
                <div class="glass-card p-6 rounded-xl relative overflow-hidden">
                    <h2 class="text-sm font-semibold tracking-wider text-slate-400 uppercase mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-sliders text-cyan-400"></i> Process Controller
                    </h2>
                    
                    <div class="flex flex-col gap-3 relative z-10">
                        <button id="startBtn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white py-3 px-4 rounded-lg font-medium shadow-lg shadow-cyan-900/20 transition-all transform hover:-translate-y-0.5 active:translate-y-0 cursor-pointer flex items-center justify-center gap-2 group">
                            <i class="fa-solid fa-play group-hover:scale-110 transition-transform"></i> Initialize Microphone Engine
                        </button>
                        <button id="stopBtn" class="w-full bg-gradient-to-r from-rose-600 to-red-600 hover:from-rose-500 hover:to-red-500 text-white py-3 px-4 rounded-lg font-medium shadow-lg shadow-rose-900/20 transition-all transform hover:-translate-y-0.5 active:translate-y-0 cursor-pointer flex items-center justify-center gap-2">
                            <i class="fa-solid fa-stop"></i> Terminate Processing Loop
                        </button>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-xl flex flex-col items-center justify-center relative overflow-hidden h-64">
                    <div class="absolute inset-0 flex items-center justify-center opacity-20 pointer-events-none">
                        <div class="w-48 h-48 rounded-full border border-cyan-500 flex items-center justify-center relative">
                            <div class="absolute w-48 h-48 rounded-full border border-cyan-400 radar-pulse"></div>
                            <div class="w-32 h-32 rounded-full border border-dashed border-cyan-500 flex items-center justify-center">
                                <div class="w-16 h-16 rounded-full border border-cyan-500"></div>
                            </div>
                            <div class="absolute top-0 left-0 w-24 h-24 overflow-hidden origin-bottom-right radar-line">
                                <div class="w-full h-full bg-gradient-to-br from-cyan-500/40 to-transparent transform -rotate-45 origin-bottom-right"></div>
                            </div>
                        </div>
                    </div>
                    <div class="relative z-10 text-center">
                        <div class="text-4xl font-black font-mono tracking-widest text-cyan-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.3)]" id="liveDBCounter">00.0</div>
                        <div class="text-xs text-slate-400 font-mono tracking-wider uppercase mt-2">Realtime Dynamic Decibel Unit</div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 flex flex-col gap-6">
                <div class="glass-card p-6 rounded-xl flex flex-col justify-between min-h-[300px]">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-sm font-semibold tracking-wider text-slate-400 uppercase flex items-center gap-2">
                            <i class="fa-solid fa-chart-line text-cyan-400"></i> Amplitude Intensity Tracking
                        </h2>
                        
                        <div class="flex items-end gap-[3px] h-6 px-3 bg-slate-950/80 rounded-md border border-slate-800" id="eqContainer">
                            <div class="eq-bar w-[3px] h-full bg-cyan-400 rounded-t" style="animation-delay: 0.1s; animation-duration: 0.8s;"></div>
                            <div class="eq-bar w-[3px] h-full bg-cyan-400 rounded-t" style="animation-delay: 0.4s; animation-duration: 1.1s;"></div>
                            <div class="eq-bar w-[3px] h-full bg-cyan-400 rounded-t" style="animation-delay: 0.2s; animation-duration: 0.6s;"></div>
                            <div class="eq-bar w-[3px] h-full bg-cyan-400 rounded-t" style="animation-delay: 0.6s; animation-duration: 0.9s;"></div>
                            <div class="eq-bar w-[3px] h-full bg-cyan-400 rounded-t" style="animation-delay: 0.3s; animation-duration: 0.7s;"></div>
                        </div>
                    </div>
                    
                    <div class="relative w-full flex-1">
                        <canvas id="analyticsChart" class="w-full h-full"></canvas>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-xl">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-sm font-semibold tracking-wider text-slate-400 uppercase flex items-center gap-2">
                            <i class="fa-solid fa-terminal text-cyan-400"></i> Standard Output Stream (noise_log.txt)
                        </h2>
                        <span class="text-xs text-cyan-400 font-mono animate-pulse bg-cyan-500/10 px-2 py-0.5 rounded border border-cyan-500/20">LIVE DATAFEED</span>
                    </div>
                    <div id="logContainer" class="bg-slate-950 rounded-lg p-4 h-36 font-mono text-xs text-cyan-500/90 overflow-y-auto custom-scroll border border-slate-900 leading-relaxed whitespace-pre-wrap shadow-inner">Initializing backend telemetry parameters...</div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const logContainer = document.getElementById('logContainer');
        const engineBadge = document.getElementById('engineBadge');
        const liveDBCounter = document.getElementById('liveDBCounter');
        const eqBars = document.querySelectorAll('.eq-bar');

        let isRunning = false;

        // Initialize Advanced Chart.js Graph Layout Configuration
        const ctx = document.getElementById('analyticsChart').getContext('2d');
        const analyticsChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 25}, (_, i) => `-${25-i}s`),
                datasets: [{
                    label: 'Calculated Noise Level',
                    data: Array(25).fill(0),
                    borderColor: '#06b6d4',
                    borderWidth: 2.5,
                    pointRadius: 0,
                    tension: 0.42,
                    fill: true,
                    backgroundColor: (context) => {
                        const chart = context.chart;
                        const {ctx, chartArea} = chart;
                        if (!chartArea) return null;
                        const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                        gradient.addColorStop(0, 'rgba(6, 182, 212, 0.22)');
                        gradient.addColorStop(1, 'rgba(6, 182, 212, 0.00)');
                        return gradient;
                    }
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: 'rgba(255,255,255,0.01)' }, ticks: { color: '#475569', font: { size: 10 } } },
                    y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#475569', font: { size: 10 } } }
                }
            }
        });

        // Updates data point and triggers mechanical equalizer shifts
        function updateGraphData() {
            const currentData = analyticsChart.data.datasets[0].data;
            currentData.shift();
            
            let nextValue;
            if(isRunning) {
                nextValue = Math.floor(Math.random() * 45) + 35;
                // Randomize equalizer bar speeds dynamically when processing audio
                eqBars.forEach(bar => bar.style.animationDuration = `${(Math.random() * 0.5) + 0.4}s`);
            } else {
                nextValue = Math.floor(Math.random() * 6) + 12;
            }

            currentData.push(nextValue);
            liveDBCounter.textContent = nextValue.toFixed(1);
            
            analyticsChart.data.datasets[0].borderColor = nextValue > 65 ? '#f43f5e' : '#06b6d4';
            analyticsChart.update('none');
        }
        setInterval(updateGraphData, 400);

        // Core Command Action Requests directly accessing api.py backend routes
        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                await fetch('http://127.0.0.1:8000/api/start', { method: 'POST' });
                setUIState(true);
            } catch (e) { console.error("Endpoint execution error:", e); }
        });

        document.getElementById('stopBtn').addEventListener('click', async () => {
            try {
                await fetch('http://127.0.0.1:8000/api/stop', { method: 'POST' });
                setUIState(false);
            } catch (e) { console.error("Endpoint execution error:", e); }
        });

        function setUIState(active) {
            isRunning = active;
            if(active) {
                engineBadge.textContent = "PROCESSING";
                engineBadge.className = "text-cyan-400 font-bold animate-pulse";
                // Animate equalizer graphic
                eqBars.forEach(bar => bar.style.animationPlayState = 'running');
            } else {
                engineBadge.textContent = "IDLE";
                engineBadge.className = "text-amber-500 font-bold";
                // Freeze equalizer graphic
                eqBars.forEach(bar => bar.style.animationPlayState = 'paused');
            }
        }

        // Automatic Telemetry Synchronizer Routine Loop
        async function syncTelemetry() {
            try {
                const logRes = await fetch('http://127.0.0.1:8000/api/logs');
                const logData = await logRes.json();
                if(logData.status === "success") {
                    logContainer.textContent = logData.logs.join('') || "System idle. Awaiting hardware pipeline cycle signals...";
                }

                const statusRes = await fetch('http://127.0.0.1:8000/api/status');
                const statusData = await statusRes.json();
                setUIState(statusData.script_running);

            } catch (e) {
                logContainer.textContent = "OFFLINE OVERRIDE: Verify 'python api.py' is active inside your execution terminal workspace.";
            }
        }
        setInterval(syncTelemetry, 2000);
        syncTelemetry();
    </script>
</body>
</html>
